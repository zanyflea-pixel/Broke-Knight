<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Broke Knight</title>
  <style>
    html,body{margin:0;height:100%;background:#0b1330;overflow:hidden;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;}
    #wrap{position:fixed;inset:0;display:flex;}
    canvas{width:100%;height:100%;display:block;}
    .hint{position:fixed;left:12px;bottom:10px;color:#d7e0ff;font-size:12px;opacity:.8;user-select:none}
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game"></canvas></div>
  <div class="hint">
    Move: Arrow Keys • Fireball: A • Sail: B (near dock) • Map: M • Skills: K • Inventory: I • God: G • Save: Ctrl+S • Load: Ctrl+L
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
