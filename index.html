<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Broke Knight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070b12;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: block;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 16%, rgba(42, 74, 114, 0.28), rgba(0, 0, 0, 0) 42%),
        linear-gradient(180deg, #0b1220 0%, #091019 100%);
    }

    #overworld {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      cursor: crosshair;
      image-rendering: auto;
    }

    #noscript-msg {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(10, 14, 22, 0.92);
      color: rgba(240, 244, 252, 0.96);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      font-size: 14px;
      line-height: 1.4;
      z-index: 10;
    }

    .js-ready #noscript-msg {
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="overworld" tabindex="0" aria-label="Broke Knight game canvas"></canvas>
  </div>

  <div id="noscript-msg">Enable JavaScript to run Broke Knight.</div>

  <script>
    document.documentElement.classList.add("js-ready");
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
