<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Broke Knight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070b;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: block;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(82, 116, 150, 0.20), rgba(0, 0, 0, 0) 34%),
        linear-gradient(180deg, #060a10 0%, #080c12 58%, #05070b 100%);
    }

    #overworld {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      cursor: crosshair;
      image-rendering: auto;
      touch-action: none;
    }

    #noscript-msg {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(10, 14, 22, 0.92);
      color: rgba(240, 244, 252, 0.96);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      font-size: 14px;
      line-height: 1.4;
      z-index: 10;
    }

    .js-ready #noscript-msg {
      display: none;
    }

    #fatal-error {
      position: fixed;
      inset: 16px;
      z-index: 20;
      margin: 0;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid rgba(255, 120, 120, 0.45);
      border-radius: 8px;
      background: rgba(12, 5, 7, 0.94);
      color: #ffd7d7;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      font: 13px/1.45 Consolas, "SFMono-Regular", monospace;
      user-select: text;
      -webkit-user-select: text;
      touch-action: auto;
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="overworld" tabindex="0" aria-label="Broke Knight game canvas"></canvas>
  </div>

  <div id="noscript-msg">Enable JavaScript to run Broke Knight.</div>

  <script>
    document.documentElement.classList.add("js-ready");
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
